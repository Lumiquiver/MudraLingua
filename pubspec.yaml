name: mudra_lingua
description: MudraLingua — Duolingo-style ISL learning and real-time translation app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.3
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_messaging: ^15.1.3
  google_mlkit_hand_detection: ^0.11.0
  tflite_flutter: ^0.11.0
  camera: ^0.11.0+2
  flutter_tts: ^4.0.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  intl: ^0.19.0
  lottie: ^3.1.2
  rive: ^0.13.11
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/rive/
    - assets/videos/
    - assets/images/
    - assets/models/
